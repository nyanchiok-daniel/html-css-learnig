<style>
    .subscribe-button 
     { 
     background-color:rgba(230, 13, 13, 0.781) ;
    color:white;
     border: none;
     padding-top: 10px;
     padding-bottom: 10px;
     padding-left:16px ;
     padding-right: 16px;
     
     border-radius: 3px;
     cursor: pointer;
    transition: opacity 0.15s;
    }
    
    .subscribe-button:hover
    {
    opacity: 0.8;
    
    
    }
    .subscribe-button:active
    {
     opacity: 0.4;
    
    }
    
    .join-button
     {
    background-color:white ;
    border-color: rgba(41, 121, 158, 0.801);
    border-style: solid;
    border-width: 1px;
    color: rgba(41, 121, 158, 0.801);
     height:36px;
     width: 70px;
     border-radius: 3px;
     cursor:pointer;
     margin-left:8px ;
     transition: opacity 0.5s,color 0.5s;
     padding-top: 9px;
     padding-bottom: 9px;
     padding-left:16px ;
     padding-right: 16px;
    }
    
    .join-button:hover
    {
    background-color:rgba(41, 121, 158, 0.801); ;
    color:white ;
    }
    .join-button:active{
        opacity: 0.8;
    }
    
    .Tweet-button
    {
    background-color: rgb(44, 151, 201);
    color:white;
    border:none;
    height: 36px;
    border-radius: 18px;
    width: 89px;
    font-weight: bold;
    font-size:15px;
    cursor: pointer;
    margin-left: 8px;
    transition: 0.15s;
    padding-top: 9px;
     padding-bottom: 9px;
     padding-left:16px ;
     padding-right: 16px;
    }
    .Tweet-button:hover {
    box-shadow:0px 1px 3px  rgba(0, 0, 0, 0.15);
    
    }
    
    </style>
    <button class="subscribe-button">
    SUBSCRIBE</button>
    <button class="join-button">
        JOIN </button>
    <button class="Tweet-button">
        Tweet</button>
